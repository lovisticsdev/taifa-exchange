services:
  taifa-exchange-postgres:
    image: postgres:latest
    container_name: taifa-exchange-postgres
    environment:
      POSTGRES_USER: taifa
      POSTGRES_PASSWORD: taifa_dev_password
      POSTGRES_DB: taifa_exchange
    ports:
      - "55433:5432"
    volumes:
      - taifa-exchange-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taifa -d taifa_exchange"]
      interval: 5s
      timeout: 5s
      retries: 20

  taifa-exchange-migrate:
    image: postgres:latest
    container_name: taifa-exchange-migrate
    depends_on:
      taifa-exchange-postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    environment:
      DATABASE_URL: postgres://taifa:taifa_dev_password@taifa-exchange-postgres:5432/taifa_exchange?sslmode=disable
    command:
      - sh
      - -c
      - |
        set -eu
        for migration in /migrations/*.up.sql; do
          echo "applying $$migration"
          psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$$migration"
        done

  taifa-exchange-seed:
    build:
      context: .
    image: taifa-exchange:local
    container_name: taifa-exchange-seed
    depends_on:
      taifa-exchange-migrate:
        condition: service_completed_successfully
    environment:
      TAIFA_EXCHANGE_DATABASE_DSN: host=taifa-exchange-postgres port=5432 user=taifa password=taifa_dev_password dbname=taifa_exchange sslmode=disable
      TAIFA_EXCHANGE_DATABASE_CONNECT_TIMEOUT: 15s
      TAIFA_EXCHANGE_SEED_TIMEOUT: 5m
    entrypoint: ["/usr/local/bin/taifa-exchange-seed"]

  taifa-exchange:
    build:
      context: .
    image: taifa-exchange:local
    container_name: taifa-exchange
    depends_on:
      taifa-exchange-postgres:
        condition: service_healthy
      taifa-exchange-migrate:
        condition: service_completed_successfully
      taifa-exchange-seed:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      TAIFA_EXCHANGE_SERVICE_NAME: taifa-exchange
      TAIFA_EXCHANGE_ENV: docker
      TAIFA_EXCHANGE_HTTP_ADDR: :8081
      TAIFA_EXCHANGE_HTTP_READ_TIMEOUT: 5s
      TAIFA_EXCHANGE_HTTP_WRITE_TIMEOUT: 10s
      TAIFA_EXCHANGE_HTTP_IDLE_TIMEOUT: 60s
      TAIFA_EXCHANGE_HTTP_SHUTDOWN_TIMEOUT: 10s

      TAIFA_EXCHANGE_DATABASE_DSN: host=taifa-exchange-postgres port=5432 user=taifa password=taifa_dev_password dbname=taifa_exchange sslmode=disable
      TAIFA_EXCHANGE_DATABASE_MIN_CONNS: 1
      TAIFA_EXCHANGE_DATABASE_MAX_CONNS: 5
      TAIFA_EXCHANGE_DATABASE_CONNECT_TIMEOUT: 15s

      # On Docker Desktop for Windows, this reaches TaifaID running on the host at :8080.
      TAIFA_EXCHANGE_TAIFA_ID_BASE_URL: http://host.docker.internal:8080
      TAIFA_EXCHANGE_TAIFA_ID_TIMEOUT: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  taifa-exchange-postgres-data: